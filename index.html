<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快递单号提取器 v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  background: #f4f6f9; color: #1a1a2e; padding: 20px; line-height: 1.6;
}
.container { max-width: 980px; margin: 0 auto; }
header { text-align:center; margin-bottom:20px; }
h1 { font-size:24px; font-weight:700; color:#1a73e8; margin-bottom:4px; }
.subtitle { font-size:13px; color:#999; }

.api-bar {
  background:#fff; border-radius:12px; border:1px solid #e8e8e8;
  padding:14px 20px; margin-bottom:16px;
}
.api-row {
  display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px;
}
.api-row:last-child { margin-bottom:0; }
.api-bar label { font-size:13px; font-weight:600; color:#555; white-space:nowrap; min-width:80px; }
.api-bar input[type=password], .api-bar input[type=text] {
  flex:1; min-width:200px; padding:8px 12px;
  border:1.5px solid #e0e4e8; border-radius:8px;
  font-size:13px; font-family:monospace; outline:none; transition:border 0.2s;
}
.api-bar input:focus { border-color:#1a73e8; }
.model-select {
  flex:1; min-width:200px; padding:8px 12px;
  border:1.5px solid #e0e4e8; border-radius:8px;
  font-size:13px; outline:none; background:#fff; cursor:pointer;
}
.model-select:focus { border-color:#1a73e8; }
.model-hint { font-size:11px; color:#bbb; margin-left:4px; }
.save-btn {
  padding:8px 18px; background:#1a73e8; color:#fff;
  border:none; border-radius:8px; font-size:13px;
  font-weight:600; cursor:pointer; white-space:nowrap;
}
.save-btn:hover { background:#1557b0; }
.api-saved { font-size:12px; color:#10b981; white-space:nowrap; }

.tabs { display:flex; gap:8px; margin-bottom:16px; }
.tab {
  padding:10px 24px; border-radius:10px; border:1.5px solid #e0e4e8;
  background:#fff; font-size:14px; font-weight:600; color:#888;
  cursor:pointer; transition:all 0.15s;
}
.tab.active { background:#1a73e8; color:#fff; border-color:#1a73e8; }

.panel { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media(max-width:700px){ .panel{ grid-template-columns:1fr; } }

.card {
  background:#fff; border-radius:14px; border:1px solid #e8e8e8;
  padding:18px; display:flex; flex-direction:column;
}
.card-title {
  font-size:14px; font-weight:600; margin-bottom:12px;
  display:flex; align-items:center; justify-content:space-between;
}
.count-badge {
  background:#e8f3ff; color:#1a73e8;
  font-size:12px; font-weight:600; padding:2px 10px; border-radius:10px;
}
textarea {
  width:100%; min-height:320px; border:1.5px solid #e0e4e8;
  border-radius:10px; padding:12px; font-size:13px;
  font-family:'Courier New',monospace; resize:vertical; outline:none; transition:border 0.2s;
}
textarea:focus { border-color:#1a73e8; }

.upload-zone {
  border:2px dashed #c8d8f0; border-radius:12px;
  min-height:200px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.2s; padding:20px; text-align:center; background:#fafcff;
}
.upload-zone:hover, .upload-zone.drag { border-color:#1a73e8; background:#f0f7ff; }
.upload-zone .icon { font-size:40px; margin-bottom:10px; }
.upload-zone .hint { font-size:14px; color:#888; }
.upload-zone .hint2 { font-size:12px; color:#bbb; margin-top:6px; }
.preview-img {
  max-width:100%; max-height:260px; border-radius:8px;
  border:1px solid #e0e4e8; margin-top:10px;
}
input[type=file] { display:none; }

.output-box {
  flex:1; min-height:320px; max-height:480px; overflow-y:auto;
  border:1.5px solid #e0e4e8; border-radius:10px;
  padding:12px; font-size:13px; font-family:'Courier New',monospace; background:#fafbfc;
}
.num { display:block; padding:4px 0; border-bottom:1px solid #f0f0f0; }
.empty { color:#bbb; text-align:center; padding:40px 0; font-family:sans-serif; }

.btn-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
button {
  flex:1; min-width:100px; padding:10px 14px;
  border:none; border-radius:10px; font-size:13px;
  font-weight:600; cursor:pointer; transition:all 0.15s;
}
.btn-primary { background:#1a73e8; color:#fff; }
.btn-primary:hover { background:#1557b0; }
.btn-secondary { background:#f0f2f5; color:#444; }
.btn-secondary:hover { background:#e4e7eb; }
.btn-success { background:#10b981; color:#fff; }
.btn-success:hover { background:#0d9668; }
.btn-orange { background:#f59e0b; color:#fff; }
.btn-orange:hover { background:#d97706; }

.options {
  display:flex; gap:14px; margin-bottom:12px;
  font-size:13px; color:#666; flex-wrap:wrap; align-items:center;
}
.options label { display:flex; align-items:center; gap:5px; cursor:pointer; }

.status-bar {
  background:#f0f7ff; border:1px solid #c8d8f0; border-radius:8px;
  padding:8px 14px; font-size:12px; color:#1a73e8;
  margin-bottom:12px; display:none;
}
.status-bar.show { display:block; }

.cost-tip {
  font-size:11px; color:#10b981; margin-top:8px;
  padding:6px 10px; background:#f0fdf8; border-radius:6px;
}

.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1a1a2e; color:#fff; padding:10px 24px;
  border-radius:20px; font-size:13px; opacity:0; transition:all 0.25s; z-index:100;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.hint-text { font-size:11px; color:#bbb; margin-top:8px; line-height:1.7; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>快递单号提取器 v2</h1>
    <p class="subtitle">文字粘贴 + 截图识别 · 自动去重 · 一键导出 · 纯本地运行</p>
  </header>

  <div class="api-bar">
    <div class="api-row">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="填入 jotarou.com 注册后生成的 sk-... key"/>
      <button class="save-btn" onclick="saveKey()">保存</button>
      <span class="api-saved" id="keySaved" style="display:none">✓ 已保存</span>
      <a href="https://jotarou.com" target="_blank" style="font-size:12px;color:#1a73e8;white-space:nowrap;text-decoration:none;">还没有 Key？→ 注册免费领 ¥7</a>
    </div>
    <div class="api-row">
      <label>识别模型</label>
      <select class="model-select" id="modelSelect" onchange="updateCostTip()">
        <option value="gpt-4o-mini">gpt-4o-mini（推荐）— 够用，最省钱</option>
        <option value="gpt-4o">gpt-4o — 截图复杂/模糊时更准</option>
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 — 速度快，备选</option>
        <option value="claude-sonnet-4-6">claude-sonnet-4-6 — 最准，较贵</option>
      </select>
      <span class="model-hint" id="costHint"></span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('text')" id="tab-text">📋 粘贴文字</div>
    <div class="tab" onclick="switchTab('image')" id="tab-image">🖼️ 上传截图</div>
  </div>

  <div class="options">
    <label><input type="checkbox" id="dedup" checked> 自动去重</label>
    <label><input type="checkbox" id="sort"> 排序</label>
    <label>
      最短位数:
      <select id="minLen" style="padding:2px 6px;border-radius:6px;border:1px solid #ddd;font-size:13px;">
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12" selected>12</option>
        <option value="13">13</option>
      </select>
    </label>
  </div>

  <div class="status-bar" id="statusBar">正在识别，请稍候…</div>

  <div class="panel">
    <div class="card">
      <div id="textTab">
        <div class="card-title">① 粘贴群消息</div>
        <textarea id="input" placeholder="把快递群消息整段粘贴到这里&#10;多个群的内容混在一起也可以&#10;单号和文字混杂没关系…"></textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="extractFromText()">提取单号</button>
          <button class="btn-secondary" onclick="clearInput()">清空</button>
        </div>
        <p class="hint-text">✅ 纯文字模式不调用 AI，不消耗费用，准确率接近 100%<br>支持 YT/JT/SF 等前缀单号及纯数字单号，连续粘连的单号也能拆开</p>
      </div>
      <div id="imageTab" style="display:none">
        <div class="card-title">① 上传截图</div>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
             ondragover="event.preventDefault();this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <div class="icon">📸</div>
          <div class="hint">点击上传 或 直接拖入截图</div>
          <div class="hint2">支持 JPG / PNG，可多张</div>
          <img class="preview-img" id="previewImg" style="display:none"/>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFile(this.files)"/>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn-orange" onclick="extractFromImage()">🔍 识别并提取</button>
          <button class="btn-secondary" onclick="clearImage()">清空</button>
        </div>
        <div class="cost-tip" id="costTip"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>② 提取结果</span>
        <span class="count-badge" id="count">0 个</span>
      </div>
      <div class="output-box" id="output">
        <div class="empty">提取结果会显示在这里</div>
      </div>
      <div class="btn-row">
        <button class="btn-success" onclick="copyResult()">复制全部</button>
        <button class="btn-secondary" onclick="exportExcel()">导出 Excel</button>
        <button class="btn-secondary" onclick="clearResult()">清空结果</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div style="text-align:center;margin-top:20px;font-size:12px;color:#bbb;">
  图片识别由 <a href="https://jotarou.com" target="_blank" style="color:#1a73e8;text-decoration:none;font-weight:600;">Jotarou API</a> 提供支持 · 注册送 ¥7 试用额度
</div>

<script>
let results = [];
let imageFiles = [];

const MODEL_COST = {
  'gpt-4o-mini':              '约 ¥0.01~0.03 / 张',
  'gpt-4o':                   '约 ¥0.05~0.15 / 张',
  'claude-haiku-4-5-20251001':'约 ¥0.02~0.05 / 张',
  'claude-sonnet-4-6':        '约 ¥0.10~0.25 / 张'
};

window.onload = () => {
  const savedKey = localStorage.getItem('jotarou_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
    document.getElementById('keySaved').style.display = 'inline';
  }
  const savedModel = localStorage.getItem('jotarou_model');
  if (savedModel) document.getElementById('modelSelect').value = savedModel;
  updateCostTip();
  renderOutput();
};

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showToast('请先填写 API Key'); return; }
  localStorage.setItem('jotarou_key', key);
  document.getElementById('keySaved').style.display = 'inline';
  showToast('API Key 已保存');
}

function updateCostTip() {
  const model = document.getElementById('modelSelect').value;
  localStorage.setItem('jotarou_model', model);
  const cost = MODEL_COST[model] || '';
  document.getElementById('costTip').textContent = '当前模型：' + model + '  · 费用估算：' + cost;
  document.getElementById('costHint').textContent = MODEL_COST[model] || '';
}

function switchTab(tab) {
  document.getElementById('textTab').style.display = tab === 'text' ? '' : 'none';
  document.getElementById('imageTab').style.display = tab === 'image' ? '' : 'none';
  document.getElementById('tab-text').className = 'tab' + (tab === 'text' ? ' active' : '');
  document.getElementById('tab-image').className = 'tab' + (tab === 'image' ? ' active' : '');
}

function extractNumbers(text) {
  const minLen = parseInt(document.getElementById('minLen').value);
  const dedup = document.getElementById('dedup').checked;
  const doSort = document.getElementById('sort').checked;
  const p1 = /[A-Z]{1,3}\d{10,18}/g;
  const p2 = /(?<![A-Z\d])\d{12,18}(?!\d)/g;
  let found = [];
  const m1 = text.match(p1); if (m1) found = found.concat(m1);
  const m2 = text.match(p2); if (m2) found = found.concat(m2);
  found = found.filter(n => {
    const digits = n.replace(/[A-Za-z]/g, '');
    if (digits.length < minLen) return false;
    if (n.length > 20) return false;
    if (/^(19|20)\d{2}$/.test(n)) return false;
    return true;
  });
  if (dedup) found = [...new Set(found)];
  if (doSort) found.sort();
  return found;
}

function extractFromText() {
  const text = document.getElementById('input').value;
  if (!text.trim()) { showToast('请先粘贴消息内容'); return; }
  results = extractNumbers(text);
  renderOutput();
  if (results.length === 0) showToast('未识别到单号，试试调小"最短位数"');
  else showToast('提取到 ' + results.length + ' 个单号');
}

function handleFile(files) {
  if (!files.length) return;
  imageFiles = Array.from(files);
  const preview = document.getElementById('previewImg');
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
  reader.readAsDataURL(files[0]);
  showToast('已选择 ' + files.length + ' 张图片');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  handleFile(e.dataTransfer.files);
}

async function extractFromImage() {
  if (!imageFiles.length) { showToast('请先上传截图'); return; }
  const key = localStorage.getItem('jotarou_key') || document.getElementById('apiKey').value.trim();
  if (!key) { showToast('请先填写并保存 API Key'); return; }
  const model = document.getElementById('modelSelect').value;

  const statusBar = document.getElementById('statusBar');
  statusBar.textContent = '正在识别 ' + imageFiles.length + ' 张图片（模型：' + model + '）…';
  statusBar.classList.add('show');

  let allText = '';
  for (let i = 0; i < imageFiles.length; i++) {
    statusBar.textContent = '正在识别第 ' + (i+1) + '/' + imageFiles.length + ' 张（' + model + '）…';
    try {
      const b64 = await fileToBase64(imageFiles[i]);
      const mime = imageFiles[i].type || 'image/jpeg';

      // Build messages - both OpenAI and Claude use same format via jotarou gateway
      const resp = await fetch('https://jotarou.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({
          model: model,
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: 'data:' + mime + ';base64,' + b64 } },
              { type: 'text', text: '请识别图片中所有快递单号，只输出单号本身，每行一个，不要任何解释、标点或其他文字。快递单号特征：字母前缀如YT/JT/SF等加数字，或纯数字12-18位。' }
            ]
          }]
        })
      });

      const data = await resp.json();
      if (data.error) { showToast('API错误: ' + data.error.message); statusBar.classList.remove('show'); return; }
      allText += '\n' + data.choices[0].message.content;
    } catch(e) {
      showToast('识别失败: ' + e.message);
    }
  }

  statusBar.classList.remove('show');
  if (allText.trim()) {
    const newResults = extractNumbers(allText);
    results = document.getElementById('dedup').checked
      ? [...new Set([...results, ...newResults])]
      : [...results, ...newResults];
    renderOutput();
    showToast('识别完成，共 ' + results.length + ' 个单号');
  } else {
    showToast('未识别到任何内容');
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderOutput() {
  const out = document.getElementById('output');
  document.getElementById('count').textContent = results.length + ' 个';
  if (!results.length) { out.innerHTML = '<div class="empty">提取结果会显示在这里</div>'; return; }
  out.innerHTML = results.map(n => '<span class="num">' + n + '</span>').join('');
}

function copyResult() {
  if (!results.length) { showToast('没有可复制的内容'); return; }
  const txt = results.join('\n');
  navigator.clipboard.writeText(txt).then(() => showToast('已复制 ' + results.length + ' 个单号'))
  .catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('已复制 ' + results.length + ' 个单号');
  });
}

function exportExcel() {
  if (!results.length) { showToast('没有可导出的内容'); return; }
  let csv = '\uFEFF序号,快递单号\n';
  results.forEach((n, i) => { csv += (i+1) + ',"' + n + '"\n'; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = '快递单号_' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2) + '_' + ('0'+d.getHours()).slice(-2) + ('0'+d.getMinutes()).slice(-2) + '.csv';
  a.click();
  showToast('已导出 Excel 文件');
}

function clearInput() { document.getElementById('input').value = ''; }
function clearImage() {
  imageFiles = [];
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('fileInput').value = '';
}
function clearResult() { results = []; renderOutput(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
